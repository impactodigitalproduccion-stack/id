<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reino Mágico · Preview</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  body { 
    margin: 0; padding: 0; 
    background: #fff url('invitacion_cumple_princesa_1775722156243.png') center/cover no-repeat;
    height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif; overflow: hidden;
  }
  .castle { 
    background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 30% 30% 0 0;
    text-align: center; border: 3px solid #ff8da1; box-shadow: 0 0 30px rgba(255, 141, 161, 0.5);
    animation: floating 3s ease-in-out infinite;
  }
  @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  h1 { font-family: 'Great Vibes', cursive; color: #ff8da1; font-size: 3.5rem; margin: 0; }
  .sparkle { position: absolute; color: gold; font-size: 20px; animation: shine 1.5s infinite; }
  @keyframes shine { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1.2); } }
</style>
</head>
<body>
  <div class="sparkle" style="top:20%; left:20%;">✨</div>
  <div class="sparkle" style="top:30%; right:15%;">✨</div>
  <div class="sparkle" style="bottom:25%; left:10%;">✨</div>

  <div class="castle">
    <h1>Sofía</h1>
    <div style="letter-spacing: 0.2em; color: #888; font-size: 10px; margin-top: 10px;">ÚNETE A NUESTRO CUENTO DE HADAS</div>
    <div style="font-size: 14px; margin-top: 20px; color: #ff8da1; font-weight: bold;">5º ANIVERSARIO REAL</div>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.dropbox.com/scl/fi/ouyl0komx3rd9uy1g3fwb/music_15.mp3?rlkey=l0v5y6oj4auihq01xky5pxz7u&raw=1" type="audio/mpeg">
  </audio>
  <button onclick="document.getElementById('bgMusic').play()" style="position:fixed; bottom:20px; background:none; border:none; color:#ff8da1; cursor:pointer;"><i class="fas fa-music"></i> Activar Magia</button>
</body>
</html>
