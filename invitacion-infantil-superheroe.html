<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Súper Cumpleaños · Preview</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body { 
    margin: 0; padding: 0; 
    background: #000 url('invitacion_cumple_superheroe_1775722029110.png') center/cover no-repeat;
    height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Arial Black', sans-serif; overflow: hidden;
  }
  .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }
  .boom { 
    position: relative; background: #ffea00; color: #000; padding: 20px;
    border: 5px solid #000; transform: rotate(-5deg);
    box-shadow: 10px 10px 0 #ed1c24; animation: pop 0.5s infinite alternate;
  }
  @keyframes pop { from { transform: rotate(-5deg) scale(1); } to { transform: rotate(-5deg) scale(1.1); } }
  h1 { margin: 0; font-size: 3rem; text-transform: uppercase; -webkit-text-stroke: 2px #fff; }
  .info { margin-top: 10px; font-size: 1.2rem; }
  
  .music-btn {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    width: 60px; height: 60px; border-radius: 50%;
    background: #ed1c24; border: 4px solid #000;
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 4px 0 #000; transition: .1s; font-size: 24px;
  }
  .music-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
</style>
</head>
<body>
  <div class="overlay"></div>
  <button class="music-btn" onclick="toggleMusic()"><i class="fas fa-play" id="musicIcon"></i></button>

  <div class="boom">
    <h1>¡BOOM!</h1>
    <div class="info">SÚPER MATEO CUMPLE 6</div>
    <div style="font-size: 14px; margin-top: 10px;">¡ÚNETE A LA LIGA DEL CUMPLEAÑOS!</div>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.dropbox.com/scl/fi/ouyl0komx3rd9uy1g3fwb/music_15.mp3?rlkey=l0v5y6oj4auihq01xky5pxz7u&raw=1" type="audio/mpeg">
  </audio>

  <script>
    var playing = false;
    function toggleMusic() {
      var audio = document.getElementById('bgMusic');
      playing = !playing;
      if (playing) { audio.play(); } else { audio.pause(); }
      document.getElementById('musicIcon').className = playing ? 'fas fa-pause' : 'fas fa-play';
    }
  </script>
</body>
</html>
